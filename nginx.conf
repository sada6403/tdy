# NF Plantation — Nginx Configuration for VPS
#
# SETUP STEPS:
#   1. Copy this file to: /etc/nginx/sites-available/nfplantation
#   2. Replace YOUR_DOMAIN with your actual domain (e.g. admin.nfplantation.com)
#   3. Replace /var/www/nf-plantation with your actual project path
#   4. Enable site:  sudo ln -s /etc/nginx/sites-available/nfplantation /etc/nginx/sites-enabled/
#   5. Test config:  sudo nginx -t
#   6. Reload:       sudo systemctl reload nginx
#   7. SSL (optional): sudo certbot --nginx -d YOUR_DOMAIN

server {
    listen 80;
    server_name YOUR_DOMAIN;

    # ─── Admin Portal (React SPA) ─────────────────────────────────────────────
    root /var/www/nf-plantation/admin-portal/dist;
    index index.html;

    # All non-API / non-upload routes go to React's index.html (client-side routing)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ─── Backend API proxy ────────────────────────────────────────────────────
    location /api/ {
        proxy_pass         http://127.0.0.1:5000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection 'upgrade';
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;

        # Increase limits for file uploads (NIC docs, bank proofs, hero images)
        client_max_body_size 15m;
        proxy_read_timeout   60s;
    }

    # ─── Uploaded files (documents, signatures, hero images) ─────────────────
    location /uploads/ {
        proxy_pass         http://127.0.0.1:5000;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;

        # Cache uploaded images in browser for 7 days
        add_header Cache-Control "public, max-age=604800, immutable";
    }

    # ─── Gzip compression ─────────────────────────────────────────────────────
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;
    gzip_min_length 1024;
}
